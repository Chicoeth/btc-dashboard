name: Daily Data Update

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update BTC Price
        run: node frontend/scripts/update-price.mjs

      - name: Update Fear & Greed Index
        run: node frontend/scripts/update-fng.mjs

      - name: Update MVRV
        run: node frontend/scripts/update-mvrv.mjs

      - name: Update STH MVRV
        run: node frontend/scripts/update-sth-mvrv.mjs

      - name: Update Strategy Holdings
        run: node frontend/scripts/update-strategy.mjs

      - name: Update ETF Holdings
        run: node frontend/scripts/update-etf-holdings.mjs

      - name: Commit and push if data changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add frontend/public/data/
          git diff --staged --quiet || git commit -m "chore: daily data update $(date -u '+%Y-%m-%d')"
          git push
