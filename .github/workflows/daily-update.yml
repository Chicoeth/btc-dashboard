name: Daily Data Update

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: btc-dashboard/frontend

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Update BTC Price
        run: node scripts/update-price.mjs

      - name: Update Fear & Greed Index
        run: node scripts/update-fng.mjs

      - name: Update MVRV
        run: node scripts/update-mvrv.mjs

      - name: Commit and push if data changed
        working-directory: .
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add btc-dashboard/frontend/public/data/
          git diff --staged --quiet || git commit -m "chore: daily data update $(date -u '+%Y-%m-%d')"
          git push
